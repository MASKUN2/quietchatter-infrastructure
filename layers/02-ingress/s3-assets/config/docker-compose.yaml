version: '3.8'
services:
  ingress:
    container_name: quietchatter-ingress
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always
    depends_on:
      - consul-client

  consul-client:
    image: hashicorp/consul:1.14
    container_name: quietchatter-consul-client
    restart: always
    network_mode: host
    volumes:
      - ./consul_data:/consul/data
    # Use array form to avoid shell parsing issues with curly braces
    command: ["agent", "-join=10.0.101.100", "-data-dir=/consul/data", "-bind={{ GetInterfaceIP \"ens5\" }}"]
