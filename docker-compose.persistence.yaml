version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quietuser
      POSTGRES_PASSWORD: quietpassword
      POSTGRES_DB: quietdb
    ports:
      - "5432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - /data/redis:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://persistence:9092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://persistence:8082,external://localhost:8082
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr persistence:33145
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"
      - "8082:8082"
    volumes:
      - /data/redpanda:/var/lib/redpanda/data
